<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Night Land RPG - Top Down</title>
    <link href="https://fonts.googleapis.com/css2?family=Quintessential&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/styles/styles.css">
</head>
<body>
    <div id="splash">
        <img src="assets/images/splashscreen.png" alt="Splash Screen">
        <button id="splash-button"></button>
    </div>
    <div id="princess-screen">
        <img src="assets/images/sadprincess.png" alt="Princess Screen">
        <button id="princess-button"></button>
        <div id="dialog" class="princess-dialog"></div>
    </div>
    <div id="game-container">
        <div id="gameplay">
            <div id="map"></div>
            <div id="redoubt"></div>
            <div id="watcher"></div>
            <div id="player"></div>
            <div id="abhuman"></div>
        </div>
    </div>
    <div id="status-bar">
        <span id="hp-display">HP: 100</span>
        <img id="gear-icon" src="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/icons/gear-fill.svg" alt="Settings">
    </div>
    <div id="settings-menu">
        <label id="sfx-label">SFX: </label>
        <input type="checkbox" id="sfx-toggle" checked>
    </div>
    <audio id="background-audio" loop>
        <source src="assets/sounds/ambient-background.wav" type="audio/wav">
    </audio>
    <div id="dialog" class="game-dialog"></div>
    <div id="info-box"></div>
    <div id="combat-player"></div>
    <div id="combat-enemy1"></div>
    <div id="combat-enemy2"></div>
    <div id="combat-enemy3"></div>
    <div id="combat-enemy4"></div>
    <script type="module" src="/scripts/gameLoop.js"></script>
</body>
</html>
